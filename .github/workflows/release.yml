name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          # Create zip archive
          zip -j "${{ github.event.repository.name }}-${tag}.zip" main.js manifest.json styles.css

          gh release create "$tag" \
            --title="$tag" \
            main.js manifest.json styles.css "${{ github.event.repository.name }}-${tag}.zip"